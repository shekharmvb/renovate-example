name: Renovate

on:
  workflow_dispatch:   # manual trigger
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours

jobs:
  renovate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v40.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          autodiscover: true